spring.application.name=onvif-profile-t-client

# Server configuration
server.port=8081

# ONVIF Camera Configuration
onvif.camera.host=localhost
onvif.camera.port=8080
onvif.camera.username=admin
onvif.camera.password=admin
onvif.camera.service-path=/onvif/device_service

# SOAP Configuration
onvif.soap.version=1.2
onvif.soap.timeout=30000

# Logging
logging.level.root=INFO
logging.level.com.onvif.client=DEBUG
logging.level.org.apache.cxf=INFO
